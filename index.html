<!DOCTYPE html>
<html lang="en" style="--color-theme-light:#f66;--color-theme-dark:#a33">
<head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crypto Bubbles</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header class="header flex-row gap-m">
        <div class="logo-area flex-row gap-m">
            <svg class="logo-icon" viewBox="0 0 64 64" width="40" height="40">
                <circle cx="32" cy="32" r="28" fill="#444" stroke="#666" stroke-width="1"/>
                <circle cx="22" cy="25" r="10" fill="#4ade80"/>
                <circle cx="42" cy="22" r="8" fill="#f87171"/>
                <circle cx="35" cy="42" r="9" fill="#4ade80" opacity="0.8"/>
                <circle cx="18" cy="40" r="6" fill="#f87171" opacity="0.8"/>
            </svg>
            <h1>Crypto Bubbles</h1>
        </div>
        <div class="grow"></div>
        <div class="input">
            <svg viewBox="0 0 24 24" class="input-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
            <input size="1" placeholder="Search cryptocurrency" id="search-input">
        </div>
        <div class="flex-row gap-m header-padded">
            <button class="solid-button select-button" id="filter-select">1 - 100
                <svg width="24" height="12" viewBox="0 6 24 12" class="select-button-arrow"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"></path></svg>
            </button>
        </div>
        <button class="solid-button select-button" id="currency-select">
            <span class="icon">$</span>USD
            <svg width="24" height="12" viewBox="0 6 24 12" class="select-button-arrow"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"></path></svg>
        </button>
        <button class="icon-button" title="Settings">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"></path></svg>
        </button>
        <div class="data-updater"></div>
    </header>
    <main>
        <div class="bubble-chart-header flex-row">
            <div class="configuration-tabs scroll-container" id="timeframe-tabs">
                <button class="tab" data-tf="hour" style="border-color:#f66">Hour</button>
                <button class="tab selected" data-tf="day" style="border-color:#f66">Day</button>
                <button class="tab" data-tf="week" style="border-color:#3f3">Week</button>
                <button class="tab" data-tf="month" style="border-color:#f66">Month</button>
                <button class="tab" data-tf="year" style="border-color:#3f3">Year</button>
            </div>
            <div class="grow"></div>
        </div>
        <div class="bubble-chart" id="bubble-chart">
            <canvas id="canvas"></canvas>
        </div>
    </main>
    <div class="tooltip" id="tooltip"></div>
    <script src="script.js"></script>
</body>
</html>
